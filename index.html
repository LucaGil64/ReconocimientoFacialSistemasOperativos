<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webapp de Reconocimiento Facial</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
    <div class="container">
        <h1>Sistema de Acceso Biométrico</h1>
        
        <div class="video-container">
            <video id="video" width="600" height="450" autoplay muted></video>
        </div>

        <div class="controls">
            <button id="btn-register" disabled>1. Guardar mi Rostro</button>
            <button id="btn-login" disabled>2. Solicitar Acceso</button>
        </div>

        <div class="status-box">
            <p id="status">Cargando modelos de Inteligencia Artificial... por favor espera.</p>
        </div>
    </div>
</body>
</html>
